name: Send Scheduled Messages

on:
  workflow_dispatch:
    inputs:
      window_minutes:
        description: "Delivery window in minutes (default: 5)"
        required: false
        default: "5"

jobs:
  send:
    runs-on: ubuntu-latest
    environment: your-environment-name  # replace with your GitHub environment name
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send scheduled messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          WINDOW_MINUTES: ${{ inputs.window_minutes || vars.WINDOW_MINUTES || '5' }}
        run: python send_message.py
